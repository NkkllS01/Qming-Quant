    <style>
      .title{font:700 40px Arial, sans-serif;fill:#17212b}
      .subtitle{font:500 17px Arial, sans-serif;fill:#667683}
      .groupTitle{font:700 20px Arial, sans-serif;fill:#253440}
      .groupText{font:600 13px Arial, sans-serif;fill:#6b7a86}
      .cardTitle{font:700 18px Arial, sans-serif;fill:#202e39}
      .cardText{font:600 13px Arial, sans-serif;fill:#63727f}
      .whiteTitle{font:700 21px Arial, sans-serif;fill:#ffffff}
      .whiteText{font:600 14px Arial, sans-serif;fill:#d5dee6}
      .tag{font:700 12px Arial, sans-serif;fill:#ffffff}
      .box{filter:url(#shadow);stroke:#d9e3e9;stroke-width:1.4}
      .lane{stroke:#dbe7ee;stroke-width:1.2}
      .flow{stroke:#536574;stroke-width:2.8;marker-end:url(#arrow)}
      .flowSoft{stroke:#8c9aa6;stroke-width:2.2;stroke-dasharray:8 9;marker-end:url(#arrow)}
      .flowRisk{stroke:#cf5d48;stroke-width:2.8;marker-end:url(#arrow)}
      .chip{stroke-width:1.2}
