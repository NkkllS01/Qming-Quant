<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbfa"/>
      <stop offset="0.48" stop-color="#edf6fb"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="okxPanel" x1="80" y1="150" x2="340" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111820"/>
      <stop offset="1" stop-color="#303d48"/>
    </linearGradient>
    <linearGradient id="corePanel" x1="420" y1="130" x2="1110" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff7f2"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17212b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#536574"/>
