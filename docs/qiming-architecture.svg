<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7faf8"/>
      <stop offset="0.55" stop-color="#eef6fb"/>
      <stop offset="1" stop-color="#f8f2ea"/>
    </linearGradient>
    <linearGradient id="okx" x1="96" y1="84" x2="376" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14191f"/>
      <stop offset="1" stop-color="#35404a"/>
    </linearGradient>
    <linearGradient id="local" x1="410" y1="118" x2="830" y2="598" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f4ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#16202a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#50616f"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif;fill:#17212b}
      .subtitle{font:500 15px Arial, sans-serif;fill:#63717d}
      .label{font:700 18px Arial, sans-serif;fill:#1f2d36}
      .small{font:600 13px Arial, sans-serif;fill:#5d6b75}
      .tiny{font:600 12px Arial, sans-serif;fill:#6d7b84}
      .light{fill:#ffffff}
      .mutedLight{fill:#cdd8df}
      .box{filter:url(#shadow);stroke:#d8e1e7;stroke-width:1.2}
      .flow{stroke:#50616f;stroke-width:2.4;marker-end:url(#arrow)}
      .softFlow{stroke:#8a99a5;stroke-width:2;stroke-dasharray:8 8;marker-end:url(#arrow)}
      .badge{font:700 12px Arial, sans-serif;fill:#ffffff}
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="72" y="64" class="title">Qiming Quant Architecture</text>
  <text x="74" y="92" class="subtitle">Personal OKX USDT perpetual system: data first, safety gated, CLI operated.</text>

  <rect x="74" y="124" width="260" height="128" rx="28" fill="url(#okx)" class="box"/>
  <text x="122" y="174" class="label light">OKX</text>
  <text x="122" y="202" class="small mutedLight">REST + WebSocket</text>
  <circle cx="260" cy="174" r="20" fill="#f3faf6" opacity="0.95"/>
  <rect x="249" y="163" width="9" height="9" fill="#14191f"/>
  <rect x="261" y="163" width="9" height="9" fill="#14191f"/>
  <rect x="249" y="175" width="9" height="9" fill="#14191f"/>
  <rect x="261" y="175" width="9" height="9" fill="#14191f"/>

  <rect x="74" y="326" width="260" height="118" rx="24" fill="#ffffff" class="box"/>
  <text x="120" y="372" class="label">Operator</text>
  <text x="120" y="400" class="small">CLI + config + logs</text>
  <path d="M252 370h36M270 352v36" stroke="#4b8f72" stroke-width="5" stroke-linecap="round"/>

  <rect x="420" y="126" width="440" height="480" rx="34" fill="url(#local)" class="box"/>
  <text x="468" y="176" class="label">Local Core</text>
  <text x="468" y="202" class="small">SQLite state, strategy logic, risk checks</text>

  <rect x="464" y="242" width="158" height="90" rx="20" fill="#e3f1ff" stroke="#b9d7ef"/>
  <text x="502" y="286" class="label">Data</text>
  <text x="492" y="309" class="tiny">candles + specs</text>
  <path d="M488 262h34M488 274h50M488 298h42" stroke="#4d84aa" stroke-width="4" stroke-linecap="round"/>

  <rect x="660" y="242" width="158" height="90" rx="20" fill="#fff4d8" stroke="#ead29a"/>
  <text x="692" y="286" class="label">Strategy</text>
  <text x="694" y="309" class="tiny">signals only</text>
  <path d="M686 264c16 32 34 32 50 0s34-32 50 0" stroke="#b98220" stroke-width="4" fill="none" stroke-linecap="round"/>

  <rect x="464" y="374" width="158" height="90" rx="20" fill="#efe8ff" stroke="#d3c2f4"/>
  <text x="508" y="418" class="label">Risk</text>
  <text x="489" y="441" class="tiny">size + limits</text>
  <path d="M541 392l34 12v22c0 22-18 30-34 38-16-8-34-16-34-38v-22l34-12z" stroke="#7a63b7" stroke-width="4" fill="none"/>

  <rect x="660" y="374" width="158" height="90" rx="20" fill="#e9f8e8" stroke="#bfe1bd"/>
  <text x="696" y="418" class="label">Sim</text>
  <text x="681" y="441" class="tiny">backtest + run</text>
  <path d="M694 430h78M710 410h46" stroke="#4b8f55" stroke-width="5" stroke-linecap="round"/>

  <rect x="464" y="506" width="354" height="70" rx="20" fill="#ffffff" stroke="#d4e2db"/>
  <text x="508" y="550" class="label">Storage</text>
  <text x="608" y="550" class="small">candles  orders  fills  safety</text>
  <ellipse cx="490" cy="538" rx="18" ry="9" stroke="#4b8f72" stroke-width="4"/>
  <path d="M472 538v22c0 5 8 9 18 9s18-4 18-9v-22" stroke="#4b8f72" stroke-width="4" fill="none"/>

  <rect x="928" y="122" width="224" height="156" rx="28" fill="#fff" class="box"/>
  <text x="976" y="176" class="label">Safety Gate</text>
  <text x="964" y="204" class="small">pause  equity  market</text>
  <text x="990" y="228" class="small">reconcile  policy</text>
  <path d="M1040 238l48-28v-48l-48-28-48 28v48l48 28z" stroke="#d65f47" stroke-width="5" fill="none"/>
  <path d="M1020 196l24 22 42-60" stroke="#d65f47" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="928" y="360" width="224" height="156" rx="28" fill="#fff" class="box"/>
  <text x="992" y="414" class="label">Live</text>
  <text x="970" y="442" class="small">dry-run first</text>
  <text x="966" y="466" class="small">small order only</text>
  <rect x="1016" y="382" width="56" height="64" rx="10" stroke="#50616f" stroke-width="4"/>
  <path d="M1028 382v-18c0-18 12-30 30-30s30 12 30 30v18" stroke="#50616f" stroke-width="4" fill="none"/>

  <rect x="928" y="584" width="224" height="78" rx="24" fill="#fff8f0" stroke="#e5c8a9" class="box"/>
  <text x="976" y="628" class="label">No Auto Live</text>
  <text x="964" y="650" class="tiny">until readiness passes</text>

  <path d="M334 185C372 185 386 185 420 185" class="flow"/>
  <path d="M334 385C372 385 386 385 420 385" class="flow"/>
  <path d="M622 287H660" class="flow"/>
  <path d="M739 332V374" class="flow"/>
  <path d="M660 419H622" class="flow"/>
  <path d="M543 464V506" class="flow"/>
  <path d="M818 419C880 419 890 208 928 208" class="flow"/>
  <path d="M1040 278V360" class="flow"/>
  <path d="M1040 516V584" class="softFlow"/>
  <path d="M928 438C888 438 880 542 818 542" class="softFlow"/>
  <path d="M928 198C880 198 872 170 860 170" class="softFlow"/>

  <rect x="89" y="615" width="218" height="44" rx="22" fill="#17212b"/>
  <text x="116" y="642" class="badge">DATA FIRST</text>
  <rect x="326" y="615" width="218" height="44" rx="22" fill="#4b8f72"/>
  <text x="354" y="642" class="badge">LOCAL AUDIT</text>
  <rect x="563" y="615" width="218" height="44" rx="22" fill="#d65f47"/>
  <text x="590" y="642" class="badge">FAIL CLOSED</text>
  <rect x="800" y="615" width="218" height="44" rx="22" fill="#50616f"/>
  <text x="827" y="642" class="badge">ONE BOT PER SUBACCOUNT</text>
</svg>
